name: Nightly Harvest

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write           # needed to create/update releases

jobs:
  harvest:
    name: Harvest OSV feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-harvest-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-harvest-

      - name: Build harvester
        run: cargo build --bin harvest --release

      - name: Run harvester
        env:
          FEED_OUTPUT_PATH: problems.feed.json
        run: ./target/release/harvest

      - name: Verify feed is non-empty
        run: |
          COUNT=$(jq 'length' problems.feed.json)
          echo "Feed contains $COUNT problems"
          if [ "$COUNT" -lt "1" ]; then
            echo "Feed is empty — aborting upload"
            exit 1
          fi

      - name: Upload feed to GitHub Release (feeds/latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: feeds/latest
          name: "Nightly OSV Feed"
          body: "Auto-generated nightly feed from OSV.dev. Do not delete — used by dep-doctor CLI."
          files: problems.feed.json
          prerelease: false
