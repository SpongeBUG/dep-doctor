name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native musl via musl-tools
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: dep-doctor-x86_64-unknown-linux-musl
            use_cross: false

          # Linux arm64 — needs cross (no native arm64 runner on free tier)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: dep-doctor-aarch64-unknown-linux-musl
            use_cross: true

          # macOS x86_64 — native
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: dep-doctor-x86_64-apple-darwin
            use_cross: false

          # macOS arm64 (M1/M2) — native on macos-latest
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: dep-doctor-aarch64-apple-darwin
            use_cross: false

          # Windows x86_64 — native
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: dep-doctor-x86_64-pc-windows-msvc.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64 musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Install cross (Linux arm64 only)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/dep-doctor ${{ matrix.asset_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item "target\${{ matrix.target }}\release\dep-doctor.exe" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Uncomment when ready to publish to crates.io:
  # Add CARGO_REGISTRY_TOKEN to repo secrets first.
